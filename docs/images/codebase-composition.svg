<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-labelledby="title desc">
  <title id="title">Evogent codebase composition</title>
  <desc id="desc">Pie chart: 5 percent agent instructions (4,066 lines) and 95 percent infrastructure code (76,506 lines), by line count of tracked source files.</desc>
  <rect width="600" height="360" fill="#fafafa" rx="12"/>
  <text x="300" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#18181b" text-anchor="middle">Where Evogent's behavior lives</text>
  <text x="300" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#71717a" text-anchor="middle">Lines of code by category, tracked source only</text>
  <path d="M 180,180 L 220.2,56.4 A 130,130 0 1,1 180,50 Z" fill="#475569"/>
  <path d="M 180,180 L 180,50 A 130,130 0 0,1 220.2,56.4 Z" fill="#f59e0b"/>
  <g transform="translate(370, 130)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <rect x="0" y="0" width="14" height="14" fill="#f59e0b" rx="2"/>
    <text x="22" y="12" font-size="14" font-weight="600" fill="#18181b">Agent instructions — 5%</text>
    <text x="22" y="32" font-size="12" fill="#52525b">4,066 lines</text>
    <text x="22" y="50" font-size="12" fill="#52525b">CLAUDE.md, skills, commands</text>
    <text x="22" y="68" font-size="12" fill="#52525b">Markdown agents read at runtime</text>
  </g>
  <g transform="translate(370, 220)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <rect x="0" y="0" width="14" height="14" fill="#475569" rx="2"/>
    <text x="22" y="12" font-size="14" font-weight="600" fill="#18181b">Infrastructure — 95%</text>
    <text x="22" y="32" font-size="12" fill="#52525b">76,506 lines</text>
    <text x="22" y="50" font-size="12" fill="#52525b">UI, queues, storage, APIs, WebSocket</text>
    <text x="22" y="68" font-size="12" fill="#52525b">TS/JS/TSX, server.js, scripts</text>
  </g>
  <text x="300" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-style="italic" fill="#71717a" text-anchor="middle">Agents do the thinking. Code does the plumbing.</text>
</svg>
